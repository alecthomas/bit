apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: example
  labels:
    app: bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: example-bff
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: http://backend:8080
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
